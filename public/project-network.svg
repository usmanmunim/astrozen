<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0a1e1e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#0e7490" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="800" height="450" fill="url(#bg6)"/>
  <circle cx="400" cy="225" r="280" fill="#0891b2" opacity="0.03"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="700">Network Design &amp; Simulation — Cisco Packet Tracer</text>
  <line x1="80" y1="44" x2="720" y2="44" stroke="#0e7490" stroke-width="1" opacity="0.3"/>

  <!-- Internet cloud -->
  <ellipse cx="400" cy="100" rx="70" ry="36" fill="#0e7490" opacity="0.15" stroke="#0891b2" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="96" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">INTERNET</text>
  <text x="400" y="110" text-anchor="middle" fill="#0891b2" font-size="9">203.0.113.1/30</text>

  <!-- Core Router -->
  <line x1="400" y1="136" x2="400" y2="158" stroke="#0e7490" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="360" y="158" width="80" height="38" rx="6" fill="#0f172a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="400" y="176" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">Router-0</text>
  <text x="400" y="189" text-anchor="middle" fill="#0e7490" font-size="8">192.168.0.1</text>

  <!-- Router to switches -->
  <line x1="360" y1="177" x2="220" y2="242" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="none" marker-end="url(#arrow)"/>
  <line x1="440" y1="177" x2="580" y2="242" stroke="#0e7490" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="196" x2="400" y2="242" stroke="#0e7490" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left Switch -->
  <rect x="160" y="242" width="120" height="38" rx="6" fill="#0f172a" stroke="#0284c7" stroke-width="1.5"/>
  <text x="220" y="260" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Switch-LAN-A</text>
  <text x="220" y="273" text-anchor="middle" fill="#0e7490" font-size="8">192.168.10.0/24</text>

  <!-- Center Switch -->
  <rect x="340" y="242" width="120" height="38" rx="6" fill="#0f172a" stroke="#0284c7" stroke-width="1.5"/>
  <text x="400" y="260" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Switch-LAN-B</text>
  <text x="400" y="273" text-anchor="middle" fill="#0e7490" font-size="8">192.168.20.0/24</text>

  <!-- Right Switch -->
  <rect x="520" y="242" width="120" height="38" rx="6" fill="#0f172a" stroke="#0284c7" stroke-width="1.5"/>
  <text x="580" y="260" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Switch-LAN-C</text>
  <text x="580" y="273" text-anchor="middle" fill="#0e7490" font-size="8">192.168.30.0/24</text>

  <!-- Left PCs -->
  <line x1="180" y1="280" x2="140" y2="330" stroke="#0e7490" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="220" y1="280" x2="220" y2="330" stroke="#0e7490" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="262" y1="280" x2="300" y2="330" stroke="#0e7490" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="110" y="330" width="60" height="28" rx="4" fill="#0c1a2e" stroke="#075985" stroke-width="1"/>
  <text x="140" y="342" text-anchor="middle" fill="#7dd3fc" font-size="8">PC-A1</text>
  <text x="140" y="352" text-anchor="middle" fill="#0e7490" font-size="7">.10.2</text>

  <rect x="190" y="330" width="60" height="28" rx="4" fill="#0c1a2e" stroke="#075985" stroke-width="1"/>
  <text x="220" y="342" text-anchor="middle" fill="#7dd3fc" font-size="8">PC-A2</text>
  <text x="220" y="352" text-anchor="middle" fill="#0e7490" font-size="7">.10.3</text>

  <rect x="270" y="330" width="60" height="28" rx="4" fill="#0c1a2e" stroke="#075985" stroke-width="1"/>
  <text x="300" y="342" text-anchor="middle" fill="#7dd3fc" font-size="8">PC-A3</text>
  <text x="300" y="352" text-anchor="middle" fill="#0e7490" font-size="7">.10.4</text>

  <!-- Center PCs -->
  <line x1="376" y1="280" x2="352" y2="330" stroke="#0e7490" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="424" y1="280" x2="448" y2="330" stroke="#0e7490" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="322" y="330" width="60" height="28" rx="4" fill="#0c1a2e" stroke="#075985" stroke-width="1"/>
  <text x="352" y="342" text-anchor="middle" fill="#7dd3fc" font-size="8">PC-B1</text>
  <text x="352" y="352" text-anchor="middle" fill="#0e7490" font-size="7">.20.2</text>

  <rect x="418" y="330" width="60" height="28" rx="4" fill="#0c1a2e" stroke="#075985" stroke-width="1"/>
  <text x="448" y="342" text-anchor="middle" fill="#7dd3fc" font-size="8">Server</text>
  <text x="448" y="352" text-anchor="middle" fill="#0e7490" font-size="7">.20.10</text>

  <!-- Right PCs -->
  <line x1="548" y1="280" x2="510" y2="330" stroke="#0e7490" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="580" y1="280" x2="580" y2="330" stroke="#0e7490" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="612" y1="280" x2="648" y2="330" stroke="#0e7490" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="480" y="330" width="60" height="28" rx="4" fill="#0c1a2e" stroke="#075985" stroke-width="1"/>
  <text x="510" y="342" text-anchor="middle" fill="#7dd3fc" font-size="8">PC-C1</text>
  <text x="510" y="352" text-anchor="middle" fill="#0e7490" font-size="7">.30.2</text>

  <rect x="550" y="330" width="60" height="28" rx="4" fill="#0c1a2e" stroke="#075985" stroke-width="1"/>
  <text x="580" y="342" text-anchor="middle" fill="#7dd3fc" font-size="8">PC-C2</text>
  <text x="580" y="352" text-anchor="middle" fill="#0e7490" font-size="7">.30.3</text>

  <rect x="618" y="330" width="60" height="28" rx="4" fill="#0c1a2e" stroke="#075985" stroke-width="1"/>
  <text x="648" y="342" text-anchor="middle" fill="#7dd3fc" font-size="8">PC-C3</text>
  <text x="648" y="352" text-anchor="middle" fill="#0e7490" font-size="7">.30.4</text>

  <!-- Status bar -->
  <rect x="80" y="398" width="640" height="30" rx="6" fill="#0c1a2e" stroke="#0e7490" stroke-width="1" opacity="0.6"/>
  <circle cx="100" cy="413" r="5" fill="#22c55e"/>
  <text x="114" y="417" fill="#22d3ee" font-size="9">Simulation Active</text>
  <text x="280" y="417" fill="#0e7490" font-size="9">Subnets: 3   Devices: 10   VLANs: 3</text>
  <text x="680" y="417" text-anchor="end" fill="#0e7490" font-size="9">Packet Tracer 8.2</text>
</svg>

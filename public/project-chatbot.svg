<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg5)"/>
  <circle cx="680" cy="100" r="140" fill="#7c3aed" opacity="0.06"/>
  <circle cx="120" cy="360" r="100" fill="#7c3aed" opacity="0.04"/>

  <!-- Chat window -->
  <rect x="80" y="30" width="640" height="390" rx="12" fill="#0f0a1e" stroke="#2e1065" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="80" y="30" width="640" height="52" rx="12" fill="#1e1035"/>
  <rect x="80" y="60" width="640" height="22" fill="#1e1035"/>
  <circle cx="116" cy="56" r="16" fill="#2e1065"/>
  <text x="116" y="61" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700">AI</text>
  <text x="142" y="52" fill="white" font-size="13" font-weight="700">PropertyBot Assistant</text>
  <text x="142" y="68" fill="#6d28d9" font-size="10">Powered by NLP · Python</text>
  <circle cx="688" cy="56" r="6" fill="#22c55e"/>

  <!-- Messages area -->
  <!-- Bot msg 1 -->
  <circle cx="108" cy="108" r="14" fill="#2e1065"/>
  <text x="108" y="113" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">AI</text>
  <rect x="130" y="94" width="340" height="42" rx="10" fill="#1e1035" stroke="#2e1065" stroke-width="1"/>
  <text x="146" y="112" fill="#e2e8f0" font-size="10">Hello! I'm your property assistant. How can</text>
  <text x="146" y="126" fill="#e2e8f0" font-size="10">I help you find your dream property today?</text>

  <!-- User msg 1 -->
  <rect x="330" y="148" width="318" height="28" rx="10" fill="#4c1d95"/>
  <text x="346" y="166" fill="#e2e8f0" font-size="10">Show me 3-bedroom condos in KL under RM 600k</text>

  <!-- Bot msg 2 -->
  <circle cx="108" cy="202" r="14" fill="#2e1065"/>
  <text x="108" y="207" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">AI</text>
  <rect x="130" y="188" width="420" height="96" rx="10" fill="#1e1035" stroke="#2e1065" stroke-width="1"/>
  <text x="146" y="206" fill="#e2e8f0" font-size="10">I found 3 matching properties for you:</text>
  <rect x="142" y="212" width="396" height="22" rx="5" fill="#2e1065" opacity="0.6"/>
  <text x="152" y="227" fill="#a78bfa" font-size="10" font-weight="600">1. Hartamas Regency — RM 580k · 3BR · MRT 500m</text>
  <rect x="142" y="238" width="396" height="22" rx="5" fill="#2e1065" opacity="0.4"/>
  <text x="152" y="253" fill="#c4b5fd" font-size="10">2. Mont Kiara Pines — RM 540k · 3BR · Freehold</text>
  <rect x="142" y="264" width="396" height="14" rx="5" fill="#2e1065" opacity="0.3"/>
  <text x="152" y="275" fill="#c4b5fd" font-size="10">3. KLCC Suites — RM 595k · 3BR · City View</text>

  <!-- User msg 2 -->
  <rect x="460" y="300" width="188" height="28" rx="10" fill="#4c1d95"/>
  <text x="476" y="318" fill="#e2e8f0" font-size="10">Tell me more about option 1</text>

  <!-- Bot msg 3 -->
  <circle cx="108" cy="348" r="14" fill="#2e1065"/>
  <text x="108" y="353" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">AI</text>
  <rect x="130" y="334" width="370" height="42" rx="10" fill="#1e1035" stroke="#2e1065" stroke-width="1"/>
  <text x="146" y="352" fill="#e2e8f0" font-size="10">Hartamas Regency: Built 2018, 1,200 sqft, fully</text>
  <text x="146" y="366" fill="#e2e8f0" font-size="10">furnished, 2 parking, gym + pool facilities...</text>

  <!-- Input bar -->
  <rect x="80" y="398" width="640" height="22" fill="#140a24"/>
  <rect x="90" y="401" width="540" height="16" rx="8" fill="#1e1035" stroke="#2e1065" stroke-width="1"/>
  <text x="104" y="413" fill="#4b5563" font-size="10">Ask about properties, pricing, locations...</text>
  <rect x="640" y="401" width="70" height="16" rx="8" fill="#6d28d9"/>
  <text x="675" y="413" text-anchor="middle" fill="white" font-size="10" font-weight="600">Send</text>
</svg>
